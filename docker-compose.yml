services:
  sumologic-mcp:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    expose:
      - '3006'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3006/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      MCP_DOMAIN: ${MCP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      sumologic-mcp:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
